# netlify.toml — Production deployment config for qum-next
# Generated: Part 8 — Hardened Content Headers
#
# CSP strategy:
#   default-src 'self'                — deny everything not explicitly allowed
#   script-src nonce-based            — no 'unsafe-inline', no 'unsafe-eval'
#   img-src data: blob: https:        — allow data URIs (canvas watermarks) + CDN
#   connect-src Firebase + Stripe     — only known API origins
#   frame-ancestors 'none'            — full clickjacking prevention
#   report-uri /api/csp-report        — violation telemetry
#
# Note: Next.js injects the nonce via middleware.ts (x-nonce header).
# The static _headers nonce is a fallback for non-SSR paths only.
# Dynamic paths use middleware-generated per-request nonces.

# ── Build ─────────────────────────────────────────────────
[build]
  command         = "npm run build"
  publish         = ".next"

[build.environment]
  NODE_VERSION    = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ── Next.js plugin ────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Redirects ─────────────────────────────────────────────
# Force HTTPS
[[redirects]]
  from   = "http://qum.sa/*"
  to     = "https://qum.sa/:splat"
  status = 301
  force  = true

# Block direct access to Next.js internals
[[redirects]]
  from   = "/_next/static/chunks/*.map"
  to     = "/404"
  status = 404
  force  = true

# ── Headers ───────────────────────────────────────────────
# Applied to ALL routes first, then overridden per path below

[[headers]]
  for = "/*"
  [headers.values]

    # ── Strict Transport Security ──────────────────────────
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # ── Prevent MIME sniffing ──────────────────────────────
    X-Content-Type-Options = "nosniff"

    # ── Full clickjacking prevention ───────────────────────
    X-Frame-Options = "DENY"

    # ── XSS auditor (legacy browsers) ─────────────────────
    X-XSS-Protection = "1; mode=block"

    # ── Referrer — send origin only on same-site requests ──
    Referrer-Policy = "strict-origin-when-cross-origin"

    # ── Permissions — deny all sensor/device APIs ─────────
    Permissions-Policy = """
      accelerometer=(),
      ambient-light-sensor=(),
      autoplay=(),
      battery=(),
      camera=(),
      cross-origin-isolated=(),
      display-capture=(),
      document-domain=(),
      encrypted-media=(),
      execution-while-not-rendered=(),
      execution-while-out-of-viewport=(),
      fullscreen=(self),
      geolocation=(),
      gyroscope=(),
      magnetometer=(),
      microphone=(),
      midi=(),
      payment=(self https://js.stripe.com),
      picture-in-picture=(),
      publickey-credentials-get=(),
      screen-wake-lock=(),
      sync-xhr=(),
      usb=(),
      web-share=(),
      xr-spatial-tracking=()
    """

    # ── Cross-Origin policies ─────────────────────────────
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

    # ── Content Security Policy ───────────────────────────
    # Nonce injection handled dynamically in middleware.ts
    # This static header is the production baseline for non-SSR paths.
    # 'unsafe-inline' is NOT present — nonce enforces all inline scripts.
    Content-Security-Policy = """
      default-src 'self';
      script-src
        'self'
        'nonce-REPLACE_WITH_MIDDLEWARE_NONCE'
        https://www.gstatic.com
        https://apis.google.com
        https://js.stripe.com
        https://maps.googleapis.com;
      script-src-elem
        'self'
        'nonce-REPLACE_WITH_MIDDLEWARE_NONCE'
        https://www.gstatic.com
        https://apis.google.com
        https://js.stripe.com;
      style-src
        'self'
        'unsafe-inline'
        https://fonts.googleapis.com;
      style-src-elem
        'self'
        'unsafe-inline'
        https://fonts.googleapis.com;
      font-src
        'self'
        https://fonts.gstatic.com
        data:;
      img-src
        'self'
        data:
        blob:
        https:
        https://res.cloudinary.com;
      media-src
        'self'
        blob:
        https://res.cloudinary.com
        https://livekit.io;
      connect-src
        'self'
        https://*.googleapis.com
        https://firestore.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://api.stripe.com
        https://res.cloudinary.com
        https://api.cloudinary.com
        https://*.livekit.cloud
        wss://*.livekit.cloud
        https://api.emailjs.com
        https://api.resend.com;
      frame-src
        'self'
        https://js.stripe.com
        https://buy.stripe.com
        https://hooks.stripe.com;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      manifest-src 'self';
      worker-src 'self' blob:;
      report-uri /api/csp-report;
      upgrade-insecure-requests;
    """

    # ── Cache-Control default ─────────────────────────────
    # Specific paths below override this
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Static assets — aggressive caching ────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    # Relax COEP for static chunks (fonts, images)
    Cross-Origin-Embedder-Policy = "unsafe-none"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# ── API routes — no caching, strict CSP ───────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control    = "no-store, no-cache, must-revalidate, private"
    Pragma           = "no-cache"
    X-Frame-Options  = "DENY"
    # API endpoints use JSON only — tighten default-src
    Content-Security-Policy = """
      default-src 'none';
      frame-ancestors 'none';
    """

# ── Admin panel — maximum lockdown ────────────────────────
[[headers]]
  for = "/admin*"
  [headers.values]
    Cache-Control    = "no-store, no-cache, must-revalidate, private"
    Pragma           = "no-cache"
    X-Frame-Options  = "DENY"
    X-Robots-Tag     = "noindex, nofollow"
    Content-Security-Policy = """
      default-src 'self';
      script-src
        'self'
        'nonce-REPLACE_WITH_MIDDLEWARE_NONCE'
        https://www.gstatic.com
        https://apis.google.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src https://fonts.gstatic.com;
      img-src 'self' data: blob: https://res.cloudinary.com;
      connect-src
        'self'
        https://*.googleapis.com
        https://firestore.googleapis.com
        https://identitytoolkit.googleapis.com
        https://api.cloudinary.com;
      frame-src 'none';
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      report-uri /api/csp-report;
      upgrade-insecure-requests;
    """

# ── Library (reader) — allow blob: for PDF canvas ─────────
[[headers]]
  for = "/library*"
  [headers.values]
    Cache-Control = "no-store, private"
    X-Frame-Options = "DENY"
    # Allow blob: for PDF.js canvas rendering
    Content-Security-Policy = """
      default-src 'self';
      script-src
        'self'
        'nonce-REPLACE_WITH_MIDDLEWARE_NONCE'
        https://www.gstatic.com
        https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src
        'self'
        https://*.googleapis.com
        https://firestore.googleapis.com;
      worker-src 'self' blob:;
      frame-src 'none';
      frame-ancestors 'none';
      object-src 'self' blob:;
      base-uri 'self';
      report-uri /api/csp-report;
      upgrade-insecure-requests;
    """

# ── Checkout — allow Stripe frame ─────────────────────────
[[headers]]
  for = "/checkout*"
  [headers.values]
    Cache-Control = "no-store, private"
    Content-Security-Policy = """
      default-src 'self';
      script-src
        'self'
        'nonce-REPLACE_WITH_MIDDLEWARE_NONCE'
        https://js.stripe.com
        https://www.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src
        'self'
        https://*.googleapis.com
        https://api.stripe.com;
      frame-src
        https://js.stripe.com
        https://buy.stripe.com
        https://hooks.stripe.com;
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://buy.stripe.com;
      report-uri /api/csp-report;
      upgrade-insecure-requests;
    """

# ── Robots ────────────────────────────────────────────────
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
